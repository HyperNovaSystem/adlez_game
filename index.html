<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adlez - A HyperNova Adventure</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
      color: #4CAF50;
      margin-bottom: 4px;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 16px;
    }

    #game {
      border: 2px solid #333;
      border-radius: 2px;
      image-rendering: pixelated;
      max-width: 100%;
      height: auto;
    }

    .controls {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      line-height: 1.8;
    }

    .controls kbd {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>ADLEZ</h1>
  <p class="subtitle">Built with the HyperNova ECS Engine</p>
  <canvas id="game"></canvas>
  <div class="controls">
    <kbd>WASD</kbd> / <kbd>Arrows</kbd> Move &nbsp;|&nbsp;
    <kbd>Space</kbd> Sword attack &nbsp;|&nbsp;
    <kbd>E</kbd> Interact / Open doors
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
